<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 16px;
      background: #1a1a2e;
      color: #eee;
    }
    h2 {
      margin: 0 0 8px;
      font-size: 16px;
      color: #fff;
    }
    .status {
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .status.active {
      background: #2d6a4f;
    }
    .status.inactive {
      background: #444;
    }
    .status.alert {
      background: #c62828;
    }
    .sites {
      font-size: 12px;
      color: #aaa;
      line-height: 1.6;
    }
    .sites strong {
      color: #ccc;
      display: block;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <h2>Clearance & Citizenship Check</h2>
  <div id="status" class="status inactive">
    Checking...
  </div>
  <div class="sites">
    <strong>Active on:</strong>
    Greenhouse, Workday, AshbyHQ, Lever, SmartRecruiters, Jobvite, iCIMS, Breezy, Workable, BambooHR, Taleo, SuccessFactors, JazzHR, Rippling, YC Jobs
  </div>
  <script src="popup.js"></script>
</body>
</html>
